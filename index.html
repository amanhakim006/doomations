<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomations | AI Video Portfolio</title>
    <style>
        :root {
            --primary-color: #ff0055;
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            padding: 50px 20px;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card {
            background: #151515;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
            border: 1px solid #333;
        }

        .video-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-color);
        }

        video {
            width: 100%;
            display: block;
        }

        .video-info {
            padding: 15px;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #cc0044;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
        }

        footer {
            padding: 40px;
            border-top: 1px solid #222;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>DOOMATIONS</h1>
        <p class="subtitle">Future of AI Cinematics & Animations</p>
        <a href="https://youtube.com/@YOUR_CHANNEL_LINK" target="_blank" class="btn">Subscribe on YouTube</a>
    </header>

    <div class="video-grid">
        <div class="video-card">
            <video controls poster="thumbnail1.jpg">
                <source src="videos/video1.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-info">
                <h3>Cyberpunk AI Vision</h3>
            </div>
        </div>

        <div class="video-card">
            <video controls poster="thumbnail2.jpg">
                <source src="videos/video2.mp4" type="video/mp4">
            </video>
            <div class="video-info">
                <h3>Nature Reimagined</h3>
            </div>
        </div>

        <div class="video-card">
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/YOUR_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
            <div class="video-info">
                <h3>YouTube AI Project</h3>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Doomations. All Rights Reserved.</p>
    </footer>

</body>
</html>
