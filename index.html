<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomations | AI Video Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --primary: #00f2ff;
            --accent: #7000ff;
            --text: #ffffff;
            --text-dim: #777;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Hero Section - Fixed for Mobile */
        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            /* Improved Mobile Sizing */
            font-size: clamp(1.4rem, 8vw, 4rem);
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Reduced letter-spacing for mobile compatibility */
            letter-spacing: clamp(4px, 2vw, 10px);
            width: 100%;
            text-align: center;
        }

        .tagline { 
            color: var(--text-dim); 
            letter-spacing: 2px; 
            font-size: 0.7rem; 
            margin-top: 10px; 
            text-transform: uppercase;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        h2.section-title {
            font-size: 1.1rem;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 40px 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
        }

        /* Video Grids */
        .vertical-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
            gap: 15px;
        }

        @media (min-width: 768px) {
            .vertical-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        }

        .horizontal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .horizontal-grid { grid-template-columns: 1fr 1fr; }
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            transition: 0.3s;
        }

        .video-card:hover { border-color: var(--primary); }

        .v-box { position: relative; width: 100%; padding-top: 177.77%; }
        .h-box { position: relative; width: 100%; padding-top: 56.25%; }

        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }

        .label { padding: 10px; font-size: 0.7rem; color: var(--text-dim); text-align: center; font-weight: 600; }

        /* Contact Section */
        .contact-section {
            background: #050505;
            padding: 60px 20px;
            margin-top: 50px;
            border-top: 1px solid #111;
            border-radius: 30px 30px 0 0;
        }

        .contact-container { max-width: 500px; margin: 0 auto; }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #222;
            color: white;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box {
            margin-top: 30px;
            padding: 20px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            text-align: center;
        }

        .info-box a {
            color: var(--primary);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* YouTube Channel Box */
        .yt-box {
            margin-top: 15px;
            padding: 20px;
            background: linear-gradient(45deg, #220000, #111);
            border: 1px solid #440000;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .yt-box:hover { border-color: #ff0000; }

        .yt-box a {
            color: #ff4444;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer { text-align: center; padding: 40px; font-size: 0.7rem; color: #444; letter-spacing: 1px; }

    </style>
</head>
<body>

    <header>
        <h1>DOOMATIONS</h1>
        <p class="tagline">PREMIUM AI VISUALS</p>
    </header>

    <div class="container">
        
        <h2 class="section-title">Vertical Shorts</h2>
        <div class="vertical-grid">
            <div class="video-card">
                <div class="v-box"><video controls muted loop preload="metadata"><source src="WhatsApp Video 2026-02-22 at 4.04.41 PM(1).mp4" type="video/mp4"></video></div>
                <div class="label">AI REEL 01</div>
            </div>
            <div class="video-card">
                <div class="v-box"><video controls muted loop preload="metadata"><source src="WhatsApp Video 2026-02-22 at 4.06.45 PM(1).mp4" type="video/mp4"></video></div>
                <div class="label">AI REEL 02</div>
            </div>
            <div class="video-card">
                <div class="v-box"><video controls muted loop preload="metadata"><source src="WhatsApp Video 2026-02-22 at 4.04.41 PM.mp4" type="video/mp4"></video></div>
                <div class="label">AI REEL 03</div>
            </div>
        </div>

        <h2 class="section-title">Cinematic Projects</h2>
        <div class="horizontal-grid">
            <div class="video-card">
                <div class="h-box"><video controls muted loop preload="metadata"><source src="WhatsApp Video 2026-02-22 at 4.06.44 PM.mp4" type="video/mp4"></video></div>
                <div class="label">CINEMATIC SCENE 01</div>
            </div>
            <div class="video-card">
                <div class="h-box"><video controls muted loop preload="metadata"><source src="WhatsApp Video 2026-02-22 at 4.06.45 PM.mp4" type="video/mp4"></video></div>
                <div class="label">CINEMATIC SCENE 02</div>
            </div>
        </div>

    </div>

    <section class="contact-section">
        <div class="contact-container">
            <h2 style="text-align:center; font-family: 'Syncopate'; font-size: 1.2rem; margin-bottom: 30px;">Get In Touch</h2>
            
            <form action="#">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="4" placeholder="How can I help you?"></textarea>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div class="info-box">
                <p style="margin:0 0 10px 0; font-size: 0.75rem; color: #555; text-transform: uppercase;">Direct Line</p>
                <a href="tel:+919373242452">+91 9373242452</a>
            </div>

            <div class="yt-box">
                <a href="https://youtube.com/@doomations" target="_blank">View YouTube Channel</a>
                <p style="margin:8px 0 0 0; font-size: 0.65rem; color: #666;">For more AI content & tutorials</p>
            </div>
            
        </div>
    </section>

    <footer>
        &copy; 2026 DOOMATIONS | POWERED BY AI TECHNOLOGY
    </footer>

</body>
</html>
