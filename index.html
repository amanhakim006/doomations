<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomations | AI Video Portfolio</title>
    <style>
        :root {
            --primary-color: #00f2ff; /* Neon Blue look for Doomations */
            --accent-color: #7000ff;
            --bg-color: #050505;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .video-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .video-card {
            background: #111;
            margin-bottom: 40px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .video-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        /* Landscape Video Handling */
        video {
            width: 100%;
            aspect-ratio: 16 / 9; /* Landscape ratio */
            display: block;
            background: #000;
        }

        .video-info {
            padding: 20px;
            text-align: left;
        }

        .video-info h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .yt-link-box {
            text-align: center;
            padding: 50px;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>DOOMATIONS</h1>
        <p class="subtitle">PREMIUM AI VIDEO PRODUCTIONS</p>
    </header>

    <div class="video-container">
        
        <div class="video-card">
            <video controls>
                <source src="WhatsApp Video 2026-02-22 at 4.06.44 PM.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-info">
                <h3>YUSUF BHAI PERFUME AI AD</h3>
            </div>
        </div>

        <div class="video-card">
            <video controls>
                <source src="WhatsApp Video 2026-02-22 at 4.06.45 PM.mp4" type="video/mp4">
            </video>
            <div class="video-info">
                <h3>Sketch to Reality AI AD</h3>
            </div>
        </div>

    </div>

    <div class="yt-link-box">
        <p>Mere aur kaam dekhne ke liye YouTube par aayein</p>
        <a href="https://youtube.com/@AmanHakim" target="_blank" class="btn">Visit YouTube Channel</a>
    </div>

    <footer>
        <p>&copy; 2026 Doomations Portfolio | Powered by AI</p>
    </footer>

</body>
</html>
