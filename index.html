<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomations | Professional AI Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --primary: #00f2ff;
            --accent: #7000ff;
            --text: #ffffff;
            --text-dim: #777;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Hero Section */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.8rem, 10vw, 4rem);
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
        }

        .tagline { color: var(--text-dim); letter-spacing: 3px; font-size: 0.8rem; margin-top: 10px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        h2.section-title {
            font-size: 1.2rem;
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 40px 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Mobile Friendly Grid - Vertical */
        .vertical-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* Mobile friendly */
            gap: 15px;
        }

        @media (min-width: 768px) {
            .vertical-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        }

        /* Mobile Friendly Grid - Horizontal */
        .horizontal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .horizontal-grid { grid-template-columns: 1fr 1fr; }
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            position: relative;
        }

        .v-box { position: relative; width: 100%; padding-top: 177.77%; }
        .h-box { position: relative; width: 100%; padding-top: 56.25%; }

        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }

        .label { padding: 10px; font-size: 0.75rem; color: var(--text-dim); text-align: center; font-weight: 600; }

        /* Contact Form */
        .contact-section {
            background: #050505;
            padding: 60px 20px;
            margin-top: 80px;
            border-top: 1px solid #111;
            border-radius: 30px 30px 0 0;
        }

        .contact-container { max-width: 600px; margin: 0 auto; }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #222;
            color: white;
            border-radius: 8px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .phone-box {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            border: 1px dashed #333;
            border-radius: 12px;
        }

        .phone-box a {
            color: var(--primary);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 800;
        }

        footer { text-align: center; padding: 40px; font-size: 0.7rem; color: #444; }

    </style>
</head>
<body>

    <header>
        <h1>DOOMATIONS</h1>
        <p class="tagline">FUTURE OF AI CINEMATICS</p>
    </header>

    <div class="container">
        
        <h2 class="section-title">Vertical AI Reels</h2>
        <div class="vertical-grid">
            <div class="video-card">
                <div class="v-box"><video controls muted loop><source src="WhatsApp Video 2026-02-22 at 4.04.41 PM(1).mp4" type="video/mp4"></video></div>

            <div class="video-card">

            </div>
            <div class="video-card">
                <div class="v-box"><video controls muted loop><source src="WhatsApp Video 2026-02-22 at 4.04.41 PM.mp4" type="video/mp4"></video></div>
                <div class="label">AI REEL 03</div>
            </div>
        </div>

        <h2 class="section-title">Cinematic Works</h2>
        <div class="horizontal-grid">
            <div class="video-card">
                <div class="h-box"><video controls muted loop><source src="WhatsApp Video 2026-02-22 at 4.06.44 PM.mp4" type="video/mp4"></video></div>
                <div class="label">LANDSCAPE CONCEPT 01</div>
            </div>
            <div class="video-card">
                <div class="h-box"><video controls muted loop><source src="WhatsApp Video 2026-02-22 at 4.06.45 PM.mp4" type="video/mp4"></video></div>
                <div class="label">LANDSCAPE CONCEPT 02</div>
            </div>
        </div>

    </div>

    <section class="contact-section">
        <div class="contact-container">
            <h2 style="text-align:center; font-family: 'Syncopate';">Contact Me</h2>
            <form action="#">
                <input type="text" placeholder="Aapka Naam" required>

            <div class="phone-box">

                <a href="tel:+919373242452">+91 9373242452</a>
            </div>
            
            <div style="text-align:center; margin-top:20px;">
                <a href="https://youtube.com/@AmanHakim" target="_blank" style="color:var(--text-dim); text-decoration:none; font-size:0.8rem;">Visit YouTube Channel</a>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 DOOMATIONS | ALL RIGHTS RESERVED
    </footer>

</body>
</html>
