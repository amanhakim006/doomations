<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomations Pro | Ultra-High Quality AI Videos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Dual-Tone Color Palette */
            --bg-dark: #070707; /* Super dark */
            --primary: #c299ff; /* Soft lavender (professional accent) */
            --accent: #ff4d94;   /* Neon pinkish accent */
            --text: #e0e0e0;     /* Soft white */
            --sub-text: #888888;
            --font-inter: 'Inter', sans-serif;
            --font-playfair: 'Playfair Display', serif;
        }

        body {
            font-family: var(--font-inter);
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Hero Section */
        header {
            padding: 120px 20px 80px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(10,10,10,1) 0%, rgba(30,30,30,0.5) 100%), 
                        url('https://images.unsplash.com/photo-1698711417066-8e50b92e54ac?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3wzMzczODV8MHwxfHNlYXJjaHw0fHxhaSUyMGFydCUyMGdlbmVyYXRpb258ZW58MHx8fHwxNzI4MDQ4ODQzfDA&ixlib=rb-4.0.3&q=80&w=1920') no-repeat center center/cover;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
        }

        h1 {
            font-family: var(--font-playfair);
            font-size: 4.5rem;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 20px rgba(194,153,255,0.2);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--sub-text);
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Portfolio Grid */
        .grid-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px;
        }

        h2.section-title {
            font-family: var(--font-playfair);
            color: var(--primary);
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        h2.section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background-color: var(--accent);
            margin: 15px auto 0 auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .video-card {
            background-color: #111;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #1a1a1a;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(194,153,255,0.3);
            box-shadow: 0 20px 40px rgba(194,153,255,0.1);
        }

        /* Vertical Video Frame */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* Vertical aspect ratio (9:16) */
            overflow: hidden;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-bottom: 2px solid #222;
        }

        .video-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .video-details {
            padding: 20px;
            position: absolute;
            bottom: 0;
            left: 0;
            width: calc(100% - 40px);
            z-index: 2;
        }

        .video-details h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* Footer Link */
        .contact-section {
            text-align: center;
            padding: 100px 20px;
            background-color: #0a0a0a;
            border-top: 1px solid #111;
        }

        .btn {
            display: inline-block;
            padding: 16px 40px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 2px solid #333;
            transition: 0.3s;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 30px rgba(255, 77, 148, 0.2);
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #333;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>DOOMATIONS</h1>
        <p class="subtitle">PREMIUM AI VIDEO PRODUCTIONS</p>
    </header>

    <div class="grid-container">
        <h2 class="section-title">THE ULTRA-HQ COLLECTION</h2>
        
        <div class="video-grid">
            
            <div class="video-card">
                <div class="video-wrapper">
                    <video controls muted loop preload="metadata">
                        <source src="WhatsApp Video 2026-02-22 at 4.06.45 PM(1).mp4" type="video/mp4">
                        Aapka browser video display nahi kar sakta.
                    </video>
                    <div class="video-details">
                        <h3>CINEMATIC SHOT I</h3>
                    </div>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <video controls muted loop preload="metadata">
                        <source src="WhatsApp Video 2026-02-22 at 4.04.41 PM.mp4" type="video/mp4">
                    </video>
                    <div class="video-details">
                        <h3>CINEMATIC SHOT II</h3>
                    </div>
                </div>
            </div>
            
            <div class="video-card">
                <div class="video-wrapper">
                    <video controls muted loop preload="metadata">
                        <source src="your_third_video.mp4" type="video/mp4">
                    </video>
                    <div class="video-details">
                        <h3>AI CONCEPT III</h3>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="contact-section">
        <p style="color:var(--sub-text); margin-bottom:30px;">Let's discuss your next AI production</p>
        <a href="https://youtube.com/@AmanHakim" target="_blank" class="btn">VISIT YOUTUBE CHANNEL</a>
    </div>

    <footer>
        &copy; 2026 DOOMATIONS | POWERED BY CREATIVE AI
    </footer>

</body>
</html>
